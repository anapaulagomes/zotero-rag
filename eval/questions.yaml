# Golden set for retrieval evaluation.
#
# Each CONCEPT (c01..c23) is asked in BOTH pt-br and en with the SAME `relevant`
# item_ids. This makes the pt-vs-en gap a clean measurement of the cross-lingual
# ability of the embedding model — same semantic query, two languages — instead of
# confounding it with "the Portuguese questions happened to be harder".
#
# The runner embeds each question with the currently-configured model, runs
# search() against LANCEDB_PATH, and scores whether ANY relevant item appears in
# the top-k, reporting recall@k and MRR per language and overall. No LLM involved:
# this measures retrieval only, which is what decides one embedding model vs another.
#
# `relevant` = item_ids that count as a correct hit (any-of). Curated by inspecting
# what bge-m3 actually returns and keeping the papers that genuinely answer the
# question. `note` is a human reminder, ignored by the runner.

