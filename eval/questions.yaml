# Golden set for retrieval evaluation.
#
# Papers are referenced by INTRINSIC identifier — a DOI when the paper has one,
# otherwise its exact title — never by the local Zotero item_id (an opaque integer
# that means nothing outside this library and can churn on a rebuild). The runner
# matches a retrieved chunk as relevant if its normalized DOI or title equals a
# `relevant` entry. Each entry carries the paper title as a trailing comment so the
# file stays auditable by eye.
#
# Each CONCEPT (c01..c23) is asked in BOTH pt-br and en with the SAME `relevant`
# list, so the pt-vs-en gap cleanly measures the model's cross-lingual ability.
# No LLM is involved: this scores retrieval only (recall@k + MRR), which is what
# decides one embedding model vs another.

questions:

